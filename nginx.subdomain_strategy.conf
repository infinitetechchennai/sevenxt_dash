# ------------------------------------------------------------
# SERVER 1: ECOMMERCE WEBSITE (sevenxt.in)
# ------------------------------------------------------------
server {
    listen 80;
    server_name sevenxt.in www.sevenxt.in;

    # Backend API for Ecommerce (if needed)
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
    }

    # Main Ecommerce Site
    location / {
        # CHANGE THIS to your actual ecommerce folder path
        root /var/www/ecommerce-website; 
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

# ------------------------------------------------------------
# SERVER 2: DASHBOARD APP (admin.sevenxt.in)
# ------------------------------------------------------------
server {
    listen 80;
    # YOU MUST ADD AN 'A RECORD' IN YOUR DNS FOR 'admin' POINTING TO THIS SERVER IP
    server_name admin.sevenxt.in; 

    # Backend API for Dashboard
    # Note: We can reuse the path /api/v1 since it's on a different domain now
    location /api/v1/ {
        proxy_pass http://127.0.0.1:8000; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Shared Uploads
    location /uploads/ {
        alias /home/ubuntu/backend/uploads/;
        autoindex on;
    }

    # Dashboard App
    location / {
        # Your existing dashboard path
        root /var/www/sevennxt-dash/Frontend/dist; 
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
