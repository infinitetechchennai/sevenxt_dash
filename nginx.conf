server {
    server_name sevenxt.in www.sevenxt.in;

    # ------------------------------------------------------------
    # 1. FRONTEND APP 1: ECOMMERCE (Main Site)
    # ------------------------------------------------------------
    # Root for the main website (files like index.html, assets/)
    root /var/www/html; 
    index index.html;

    # ------------------------------------------------------------
    # 2. FRONTEND APP 2: DASHBOARD (Admin Panel)
    # ------------------------------------------------------------
    # Logic: Redirect /login to /dashboard/login, and serve dashboard from a subfolder
    
    location = /login {
        return 301 /dashboard/login;
    }

    location /dashboard {
        # IMPORTANT: You must upload your Dashboard 'dist' folder to /var/www/dashboard_dist
        alias /var/www/dashboard_dist; 
        try_files $uri $uri/ /dashboard/index.html;
    }

    # ------------------------------------------------------------
    # 3. BACKEND APIs
    # ------------------------------------------------------------

    # Python Backend (Port 8000)
    location /api/v1/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Other Backend (Port 8001) if needed
    location /api/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------
    # 4. UPLOADS & STATIC FILES
    # ------------------------------------------------------------
    location /uploads/ {
        alias /home/ubuntu/backend/uploads/;
        autoindex on;
        add_header Access-Control-Allow-Origin *;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ------------------------------------------------------------
    # 5. MAIN FALLBACK (For Ecommerce React Routing)
    # ------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSL Configuration (Managed by Certbot - Do not change)
    listen 443 ssl; 
    ssl_certificate /etc/letsencrypt/live/sevenxt.in/fullchain.pem; 
    ssl_certificate_key /etc/letsencrypt/live/sevenxt.in/privkey.pem; 
    include /etc/letsencrypt/options-ssl-nginx.conf; 
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; 
}

# HTTP to HTTPS Redirect
server {
    if ($host = www.sevenxt.in) {
        return 301 https://$host$request_uri;
    } 
    if ($host = sevenxt.in) {
        return 301 https://$host$request_uri;
    } 
    listen 80;
    server_name sevenxt.in www.sevenxt.in;
    return 404; 
}
