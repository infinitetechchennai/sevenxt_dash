server {
    server_name sevenxt.in www.sevenxt.in;

    # ------------------------------------------------------------
    # 1. ECOMMERCE SITE (Serves at root /)
    # ------------------------------------------------------------
    root /var/www/html; # <--- UPLOAD YOUR ECOMMERCE BUILD HERE
    index index.html;

    # Ecommerce Backend (Port 8001)
    location /api/ {
        proxy_pass http://127.0.0.1:8001/; # Points to Port 8001
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------
    # 2. DASHBOARD APP (Serves at /dashboard)
    # ------------------------------------------------------------
    
    # Redirect /login to /dashboard/login
    location = /login {
        return 301 /dashboard/login;
    }

    # Dashboard Frontend Files
    location /dashboard/ {
        # IMPORTANT: Create this folder: mkdir -p /var/www/dashboard_dist
        # Copy file from Frontend/dist to /var/www/dashboard_dist
        alias /var/www/dashboard_dist/; 
        index index.html;
        try_files $uri $uri/ /dashboard/index.html;
    }

    # Dashboard Backend (Port 8000)
    location /api/v1/ {
        proxy_pass http://127.0.0.1:8000; # Points to Port 8000
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ------------------------------------------------------------
    # 3. STATIC FILES
    # ------------------------------------------------------------
    location /uploads/ {
        alias /home/ubuntu/backend/uploads/;
        autoindex on;
        add_header Access-Control-Allow-Origin *;
    }

    # ------------------------------------------------------------
    # 4. DEFAULT FALLBACK
    # ------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSL Config (Leave as is)
    listen 443 ssl; 
    ssl_certificate /etc/letsencrypt/live/sevenxt.in/fullchain.pem; 
    ssl_certificate_key /etc/letsencrypt/live/sevenxt.in/privkey.pem; 
    include /etc/letsencrypt/options-ssl-nginx.conf; 
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; 
}

# Redirect HTTP to HTTPS
server {
    if ($host = www.sevenxt.in) {
        return 301 https://$host$request_uri;
    } 
    if ($host = sevenxt.in) {
        return 301 https://$host$request_uri;
    } 
    listen 80;
    server_name sevenxt.in www.sevenxt.in;
    return 404; 
}
